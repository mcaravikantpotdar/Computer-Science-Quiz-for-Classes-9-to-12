<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Generator Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 520px; margin: 0 auto; background: #ffffff; padding: 32px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { font-size: 22px; color: #0f172a; margin-bottom: 6px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; margin-bottom: 6px; }
        select, input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 11px 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
        .divider { display: flex; align-items: center; text-align: center; margin: 8px 0; color: #94a3b8; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px dashed #cbd5e1; }
        .divider span { padding: 0 8px; }
        .btn-submit { width: 100%; background: #2563eb; color: #ffffff; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }
        .status-msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; text-align: center; display: none; }
        .status-msg.info { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .status-msg.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
        .status-msg.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎓 Quiz Generator Portal</h1>
    </div>

    <form id="quizForm">
        <div class="form-group">
            <label>1. Target Class</label>
            <select id="classSelect"><option value="">-- Scanning GitHub Folders... --</option></select>
            <div class="divider"><span>OR CREATE NEW</span></div>
            <input type="text" id="newClass" placeholder="e.g. Class 11" autocomplete="off">
        </div>

        <div class="form-group">
            <label>2. Target Subject</label>
            <select id="subjectSelect"><option value="">-- Scanning GitHub Folders... --</option></select>
            <div class="divider"><span>OR CREATE NEW</span></div>
            <input type="text" id="newSubject" placeholder="e.g. Information Technology" autocomplete="off">
        </div>

        <div class="form-group">
            <label>3. Lesson / Chapter Title</label>
            <input type="text" id="lessonName" placeholder="e.g. HTML Basics" required autocomplete="off">
        </div>

        <div class="form-group">
            <label>4. Number of Questions</label>
            <input type="number" id="qCount" value="20" min="10" max="40" required>
        </div>

        <div class="form-group">
            <label>5. Upload Chapter PDF</label>
            <input type="file" id="pdfFile" accept=".pdf" required>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">🚀 Generate & Publish Quiz</button>
        <div id="status" class="status-msg"></div>
    </form>
</div>

<script>
    const WEBHOOK_URL = 'https://verygood123.app.n8n.cloud/webhook/generate-quiz-final-run';
    const REPO_OWNER = 'mcaravikantpotdar';
    const REPO_NAME = 'Computer-Science-Quiz-for-Classes-9-to-12';

    // Fetch dropdowns from your GitHub repository
    fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/main?recursive=1`)
        .then(res => res.json())
        .then(data => {
            const classes = new Set(), subjects = new Set();
            if (data.tree) {
                data.tree.forEach(item => {
                    if (item.path.startsWith('jsons/')) {
                        const parts = item.path.split('/');
                        if (parts[1]) classes.add(parts[1].replace(/_/g, ' '));
                        if (parts[2]) subjects.add(parts[2].replace(/_/g, ' '));
                    }
                });
            }
            document.getElementById('classSelect').innerHTML = '<option value="">-- Select Existing Class --</option>' + Array.from(classes).sort().map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('subjectSelect').innerHTML = '<option value="">-- Select Existing Subject --</option>' + Array.from(subjects).sort().map(s => `<option value="${s}">${s}</option>`).join('');
        });

    function showStatus(msg, type) {
        const el = document.getElementById('status');
        el.style.display = 'block';
        el.className = 'status-msg ' + type;
        el.innerText = msg;
    }

    document.getElementById('quizForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        showStatus('⏳ Extracting PDF into text...', 'info');

        const file = document.getElementById('pdfFile').files[0];
        const reader = new FileReader();

        reader.onload = async function() {
            try {
                showStatus('🚀 Sending to n8n...', 'info');
                
                const payload = {
                    existingClass: document.getElementById('classSelect').value,
                    newClass: document.getElementById('newClass').value,
                    existingSubject: document.getElementById('subjectSelect').value,
                    newSubject: document.getElementById('newSubject').value,
                    lessonName: document.getElementById('lessonName').value,
                    qCount: document.getElementById('qCount').value,
                    pdfBase64: reader.result.split(',')[1],
                    mimeType: file.type || 'application/pdf'
                };

                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error('n8n rejected the request.');
                
                showStatus('✅ Success! Quiz published via n8n.', 'success');
                btn.disabled = false;
            } catch (err) {
                showStatus('❌ Error: ' + err.message, 'error');
                btn.disabled = false;
            }
        };

        reader.readAsDataURL(file);
    });
</script>

</body>
</html>
