<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Generator Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 520px; margin: 0 auto; background: #ffffff; padding: 32px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { font-size: 22px; color: #0f172a; margin-bottom: 6px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #475569; text-transform: uppercase; margin-bottom: 6px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; }
        select:focus, input:focus { border-color: #2563eb; }
        .divider { text-align: center; margin: 12px 0; color: #94a3b8; font-size: 10px; font-weight: bold; text-transform: uppercase; display: flex; align-items: center; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px dashed #cbd5e1; }
        .divider span { padding: 0 10px; }
        .btn-submit { width: 100%; background: #2563eb; color: #ffffff; border: none; padding: 14px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }
        .status { margin-top: 16px; padding: 12px; border-radius: 6px; font-size: 13px; text-align: center; display: none; }
        .status.info { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .status.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
        .status.error { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎓 Secure Quiz Portal</h1>
    </div>

    <form id="quizForm">
        <div class="form-group">
            <label>Target Class</label>
            <select id="existingClass"><option value="">-- Scanning GitHub... --</option></select>
            <div class="divider"><span>OR CREATE NEW</span></div>
            <input type="text" id="newClass" placeholder="e.g. Class 11">
        </div>

        <div class="form-group">
            <label>Target Subject</label>
            <select id="existingSubject"><option value="">-- Scanning GitHub... --</option></select>
            <div class="divider"><span>OR CREATE NEW</span></div>
            <input type="text" id="newSubject" placeholder="e.g. Information Technology">
        </div>

        <div class="form-group">
            <label>Lesson / Chapter Title</label>
            <input type="text" id="lessonName" placeholder="e.g. HTML Basics" required>
        </div>

        <div class="form-group">
            <label>Number of Questions</label>
            <input type="number" id="qCount" value="20" min="10" max="40" required>
        </div>

        <div class="form-group">
            <label>Upload Chapter PDF</label>
            <input type="file" id="pdfFile" accept=".pdf" required>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">🚀 Generate & Publish</button>
        <div id="statusMsg" class="status"></div>
    </form>
</div>

<script>
    const WEBHOOK_URL = 'https://verygood123.app.n8n.cloud/webhook/generate-quiz-clean';
    const REPO = 'mcaravikantpotdar/Computer-Science-Quiz-for-Classes-9-to-12';

    fetch(`https://api.github.com/repos/${REPO}/git/trees/main?recursive=1`)
        .then(res => res.json())
        .then(data => {
            const classes = new Set(), subjects = new Set();
            if (data.tree) {
                data.tree.forEach(item => {
                    if (item.path.startsWith('jsons/')) {
                        const parts = item.path.split('/');
                        if (parts[1]) classes.add(parts[1].replace(/_/g, ' '));
                        if (parts[2]) subjects.add(parts[2].replace(/_/g, ' '));
                    }
                });
            }
            document.getElementById('existingClass').innerHTML = '<option value="">-- Select Existing --</option>' + [...classes].sort().map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('existingSubject').innerHTML = '<option value="">-- Select Existing --</option>' + [...subjects].sort().map(s => `<option value="${s}">${s}</option>`).join('');
        });

    function showStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        el.style.display = 'block';
        el.className = 'status ' + type;
        el.innerText = msg;
    }

    document.getElementById('quizForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        showStatus('⏳ Encoding PDF...', 'info');

        const file = document.getElementById('pdfFile').files[0];
        const reader = new FileReader();

        reader.onload = async function() {
            try {
                showStatus('🚀 Handing off to n8n securely...', 'info');
                
                const payload = {
                    existingClass: document.getElementById('existingClass').value,
                    newClass: document.getElementById('newClass').value,
                    existingSubject: document.getElementById('existingSubject').value,
                    newSubject: document.getElementById('newSubject').value,
                    lessonName: document.getElementById('lessonName').value,
                    qCount: document.getElementById('qCount').value,
                    pdfBase64: reader.result.split(',')[1],
                    mimeType: file.type || 'application/pdf'
                };

                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('n8n rejected the request. Status: ' + response.status);
                
                showStatus('✅ Success! Quiz processed and pushed to GitHub.', 'success');
                btn.disabled = false;
            } catch (err) {
                showStatus('❌ Error: ' + err.message, 'error');
                btn.disabled = false;
            }
        };

        reader.readAsDataURL(file);
    });
</script>

</body>
</html>
